spring.datasource.url=jdbc:mysql://mysql:3306/mydb
spring.datasource.username=root
spring.datasource.password=mysql
spring.jpa.hibernate.ddl-auto=update
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect



# ===============================
# DATABASE CONFIGURATION
# ===============================

# JDBC URL to connect to MySQL
# Format: jdbc:mysql://<host>:<port>/<database_name>
# "mysql" = Docker container name (not localhost)
#spring.datasource.url=jdbc:mysql://mysql:3306/mydb

# Database username (root user)
#spring.datasource.username=root

# Database password
#spring.datasource.password=mysql

# MySQL JDBC driver class (required for connection)
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# ===============================
# JPA / HIBERNATE CONFIGURATION
# ===============================

# Automatically update database schema based on entities
# Options:
#   create  -> drops & recreates tables every time
#   update  -> updates existing tables (safe for dev)
#   validate-> checks schema, does not change
#   none    -> no action
#spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in console (useful for debugging)
#spring.jpa.show-sql=true

# Hibernate dialect for MySQL (tells Hibernate how to generate SQL)
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect