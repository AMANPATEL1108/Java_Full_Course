spring.application.name=Databases_System_Design_013

# MySQL Database configuration
spring.datasource.url=jdbc:mysql://localhost:3306/urlshortenerdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=mysql
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate configuration
# Options: create, update, validate, none
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# (Optional) REMOVE this line - Spring Boot auto-detects dialect
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Server port
server.port=8080

# Redis config (optional)
spring.redis.host=localhost
spring.redis.port=6379